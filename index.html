<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FF6B35">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SpeakStar">

<title>SpeakStar - Speech Therapy for Kids</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow-x:hidden}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:linear-gradient(160deg,#FFF9F0 0%,#FFF0E0 100%);
    color:#2A2A2A;-webkit-font-smoothing:antialiased;
    min-height:100vh;overscroll-behavior:none;
  }
  #app{max-width:440px;margin:0 auto;padding:20px 16px 32px;min-height:100vh;position:relative}
  .screen{animation:fadeIn .3s ease-out}
  button{font-family:inherit;cursor:pointer;border:none;outline:none}
  
  /* Animations */
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  @keyframes pop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
  @keyframes boom{0%{transform:scale(0) rotate(-25deg);opacity:0}65%{transform:scale(1.35) rotate(6deg)}100%{transform:scale(1) rotate(0);opacity:1}}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,.45)}50%{box-shadow:0 0 0 18px rgba(255,107,53,0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}
  
  /* Shared */
  .card{background:#fff;border-radius:24px;padding:20px;margin-bottom:14px;box-shadow:0 5px 22px rgba(0,0,0,.07)}
  .btn{display:block;width:100%;border-radius:100px;padding:16px 24px;font-size:17px;font-weight:800;text-align:center;margin-bottom:10px;transition:transform .1s;font-family:inherit}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:#FF6B35;color:#fff;animation:pulse 2s ease-in-out infinite}
  .btn-secondary{background:#F0F0F0;color:#888}
  .btn-orange{background:#FF6B35;color:#fff}
  .btn-outline{background:#fff;border:2.5px solid #FF6B35;color:#FF6B35}
  
  /* Header */
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .back-btn{background:none;font-size:30px;color:#aaa;padding:0 4px;font-weight:300}
  .title{font-size:24px;font-weight:900;color:#FF6B35;flex:1;margin-left:4px}
  
  /* Lang toggle */
  .lang-row{display:flex;background:#F0EDE8;border-radius:99px;padding:3px;gap:2px}
  .lang-btn{padding:5px 13px;border-radius:99px;font-size:12px;font-weight:800;color:#aaa;background:transparent;transition:all .2s}
  .lang-btn.active{background:#fff;color:#FF6B35;box-shadow:0 2px 8px rgba(0,0,0,.1)}
  
  /* Home */
  .home-top{display:flex;justify-content:flex-end;margin-bottom:12px}
  .mascot-wrap{text-align:center;margin-top:4px}
  .app-name{font-size:38px;font-weight:900;color:#FF6B35;margin:10px 0 4px;line-height:1}
  .app-name.es{font-size:30px}
  .tagline{color:#bbb;font-size:13px;margin-bottom:24px;text-align:center}
  .stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px}
  .stat-card{background:#fff;border-radius:18px;padding:14px 8px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.06)}
  .stat-icon{font-size:24px}
  .stat-val{font-size:28px;font-weight:900;color:#FF6B35;line-height:1.1}
  .stat-label{font-size:10px;color:#bbb;margin-top:2px}
  .footer{font-size:11px;color:#ccc;margin-top:8px;text-align:center}
  
  /* Categories grid */
  .cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .cat-card{border-radius:22px;padding:16px 10px;text-align:center;border-width:3px;border-style:solid;position:relative;transition:transform .15s;cursor:pointer}
  .cat-card:active{transform:scale(.96)}
  .cat-card:hover{transform:scale(1.03)}
  .cat-emoji{font-size:40px;line-height:1}
  .cat-label{font-size:15px;font-weight:900;margin:6px 0 5px}
  .cat-stars{display:flex;justify-content:center;gap:2px}
  .cat-star{font-size:14px;opacity:.22}
  .cat-star.on{opacity:1}
  .cat-count{font-size:10px;color:#bbb;margin-top:3px}
  .cat-badge{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:900}
  
  /* Practice */
  .practice-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .counter{border-radius:99px;padding:4px 12px;font-size:12px;font-weight:800}
  .word-card{text-align:center;padding:36px 24px;animation:pop .3s ease-out}
  .word-emoji{font-size:88px;line-height:1;margin-bottom:10px}
  .word-text{font-size:52px;font-weight:900;color:#2A2A2A;letter-spacing:1px;font-family:'Segoe UI',sans-serif}
  .word-hint{font-size:13px;color:#ccc;margin-top:10px}
  .tip-toggle{background:none;border:none;font-weight:800;font-size:13px;margin-bottom:8px;padding:4px 0;cursor:pointer}
  .tip-card{border-left:4px solid;border-radius:18px;padding:12px 16px;font-size:14px;color:#444;line-height:1.6;animation:fadeIn .25s ease-out}
  .wave-row{display:flex;justify-content:center;align-items:flex-end;gap:4px;height:52px;margin:24px 0 18px}
  .wave-bar{width:5px;background:#E0E0E0;border-radius:4px;height:8px;transition:height .12s ease,background .3s}
  .wave-bar.active{background:currentColor}
  .demo-btn{background:#F5F5F5;color:#aaa;font-size:13px;padding:11px 20px;border-radius:99px;width:100%;border:1px dashed #ddd;cursor:pointer;font-family:inherit;margin-bottom:10px}
  .instructions{font-size:13px;color:#bbb;text-align:center;line-height:1.5;margin-top:8px}
  
  /* Result */
  .result-mascot{text-align:center;margin-bottom:14px}
  .celeb-emoji{font-size:42px;margin:8px 0 0;animation:wiggle .5s ease-out;display:inline-block}
  .stars-result{display:flex;justify-content:center;gap:8px;margin-bottom:14px}
  .star-result{font-size:44px;opacity:.18}
  .star-result.on{opacity:1}
  .star-result.on.an0{animation:boom .55s 0s ease-out both}
  .star-result.on.an1{animation:boom .55s .2s ease-out both}
  .star-result.on.an2{animation:boom .55s .4s ease-out both}
  .message{font-size:16px;color:#333;line-height:1.65;text-align:center;font-weight:600}
  .heard-row{margin-top:12px;background:#F8F8F8;border-radius:14px;padding:10px 14px;font-size:12px;color:#888;text-align:center}
  .tip-yellow{background:#FFFBEE;border:2.5px solid #FFD60A;border-radius:24px;padding:14px;font-size:14px;color:#555;line-height:1.65;margin-bottom:14px}
  
  /* Loading */
  .loading{text-align:center;padding-top:80px}
  .spinner{width:38px;height:38px;border:4px solid #FF6B35;border-top-color:transparent;border-radius:50%;animation:spin .75s linear infinite;margin:20px auto 0}
  .loading-text{font-size:22px;font-weight:900;color:#FF6B35;margin-top:18px}
  
  /* Progress */
  .summary-card{text-align:center;padding:22px 20px}
  .stars-count{font-size:30px;font-weight:900;color:#FF6B35;margin:10px 0 4px}
  .words-count{color:#ccc;font-size:13px}
  .section-label{font-size:11px;font-weight:900;color:#bbb;letter-spacing:.04em;margin-bottom:10px}
  .prog-card{padding:13px 18px}
  .prog-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
  .prog-emoji{font-size:20px}
  .prog-name{font-size:14px;font-weight:900;flex:1}
  .prog-count{font-size:12px;color:#ccc}
  .bar-bg{background:#F0F0F0;border-radius:99px;height:10px;overflow:hidden}
  .bar-fill{height:100%;border-radius:99px;transition:width .6s ease}
  .parent-card{background:#F0FFF9;border:2px solid #06D6A0;border-radius:24px;padding:16px;margin-top:8px}
  .parent-title{font-weight:900;color:#06D6A0;font-size:14px;margin-bottom:6px}
  .parent-text{font-size:13px;color:#555;line-height:1.65}
  
  /* Mascot */
  .mascot{animation:bounce 1.6s ease-in-out infinite}
</style>
</head>
<body>
<div id="app"></div>

<script>

    { id:'p', label:'P Sound', emoji:'🐧', color:'#C77DFF', bg:'#F5EEFF',
      hint:'Press your lips together and pop them open — like B but without your voice!',
      words:[{w:'pig',e:'🐷'},{w:'pizza',e:'🍕'},{w:'penguin',e:'🐧'},{w:'pear',e:'🍐'},{w:'purple',e:'💜'}] },
  ],

// ═══════════════════════════════════════════════════════════════════════════
//                          OFFLINE FEEDBACK
// ═══════════════════════════════════════════════════════════════════════════

  en: [
    { message:"Awesome try! You're getting better every time. ⭐", tip:'Say the word slowly, one sound at a time.', stars:3, celebEmoji:'🌟' },
    { message:'Way to go! Your hard work is paying off!', tip:'Try saying the word in front of a mirror.', stars:2, celebEmoji:'🎉' },
    { message:"You're a superstar! Keep it up!", tip:'Take a deep breath before saying the word.', stars:3, celebEmoji:'⭐' },

    { message:'Wonderful! Every practice makes you stronger.', tip:'Slow down and feel where your tongue and lips go.', stars:3, celebEmoji:'💪' },
  ],
  es: [
    { message:'¡Buen intento! Cada vez lo haces mejor. ⭐', tip:'Di la palabra despacio, un sonido a la vez.', stars:3, celebEmoji:'🌟' },
    { message:'¡Muy bien! ¡Tu esfuerzo está dando resultado!', tip:'Mírate en un espejo mientras dices la palabra.', stars:2, celebEmoji:'🎉' },
    { message:'¡Eres una superestrella! ¡Sigue así!', tip:'Respira profundo antes de decir la palabra.', stars:3, celebEmoji:'⭐' },
    { message:'¡Excelente! Fue un intento muy bueno.', tip:'¿Te oíste bien? ¡Inténtalo otra vez!', stars:2, celebEmoji:'🎊' },
    { message:'¡Maravilloso! Con cada práctica te haces más fuerte.', tip:'Despacio — siente dónde van tu lengua y tus labios.', stars:3, celebEmoji:'💪' },
  ]
};

function offlineFeedback(lang) {
  const arr = OFFLINE[lang];
  return arr[Math.floor(Math.random() * arr.length)];
}

async function getAIFeedback(lang, cat, word, spoken) {
  if (!ANTHROPIC_API_KEY || ANTHROPIC_API_KEY === 'sk-ant-YOUR_KEY_HERE') {
    return offlineFeedback(lang);
  }
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        messages: [{ role:'user', content: T[lang].aiPrompt(cat.label, word.w, spoken, cat.hint) }],
      }),
    });
    const data = await r.json();
    const raw = data.content?.find(b => b.type === 'text')?.text || '';
    return JSON.parse(raw.replace(/```json|```/g, '').trim());
  } catch (e) {
    return offlineFeedback(lang);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//                          STATE & STORAGE
// ═══════════════════════════════════════════════════════════════════════════

  wordsDone: parseInt(localStorage.getItem('wordsDone') || '0'),
  catProg: JSON.parse(localStorage.getItem('catProg') || '{}'),
  screen: 'home',
  cat: null,
  wordIdx: 0,
  spoken: null,
  feedback: null,
  isRecording: false,
  isLoading: false,
  showTip: false,
};

function save() {
  localStorage.setItem('lang', state.lang);
  localStorage.setItem('totalStars', state.totalStars);
  localStorage.setItem('wordsDone', state.wordsDone);
  localStorage.setItem('catProg', JSON.stringify(state.catProg));
}

// ═══════════════════════════════════════════════════════════════════════════
//                          MASCOT SVG
// ═══════════════════════════════════════════════════════════════════════════
function mascot(size = 80, wink = false) {
  return `
  <svg class="mascot" width="${size}" height="${size}" viewBox="0 0 80 80" style="display:block;margin:0 auto">
    <circle cx="40" cy="44" r="30" fill="#FFD60A"/>
    <polygon points="40,14 48,26 32,26" fill="#FFD60A"/>
    <circle cx="40" cy="13" r="8" fill="#FFD60A"/>
    <polygon points="40,5 44,13 36,13" fill="#FF6B35"/>
    <ellipse cx="29" cy="38" rx="5" ry="5.5" fill="#2D2D2D"/>
    <ellipse cx="51" cy="38" rx="5" ry="${wink ? 1.5 : 5.5}" fill="#2D2D2D"/>
    <circle cx="31" cy="36" r="2" fill="#fff"/>
    ${!wink ? '<circle cx="53" cy="36" r="2" fill="#fff"/>' : ''}
    <path d="M28 54 Q40 65 52 54" stroke="#2D2D2D" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="21" cy="50" r="7" fill="#FF6B35" opacity="0.3"/>
    <circle cx="59" cy="50" r="7" fill="#FF6B35" opacity="0.3"/>
  </svg>`;
}

// ═══════════════════════════════════════════════════════════════════════════
//                          RENDER FUNCTIONS
// ═══════════════════════════════════════════════════════════════════════════
function langToggle() {
  const t = T[state.lang];
  return `
    <div class="lang-row">
      <button class="lang-btn ${state.lang === 'en' ? 'active' : ''}" onclick="setLang('en')">🇺🇸 EN</button>
      <button class="lang-btn ${state.lang === 'es' ? 'active' : ''}" onclick="setLang('es')">🇲🇽 ES</button>
    </div>`;
}

function renderHome() {
  const t = T[state.lang];
  const mastered = Object.values(state.catProg).filter(v => v >= 3).length;
  return `
    <div class="screen">
      <div class="home-top">${langToggle()}</div>
      <div class="mascot-wrap">${mascot(120)}</div>
      <h1 class="app-name ${state.lang}">${t.appName}</h1>
      <p class="tagline">${t.tagline}</p>
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-icon">⭐</div>
          <div class="stat-val">${state.totalStars}</div>
          <div class="stat-label">${t.stars}</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🎯</div>
          <div class="stat-val">${state.wordsDone}</div>
          <div class="stat-label">${t.practiced}</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🏆</div>
          <div class="stat-val">${mastered}</div>
          <div class="stat-label">${t.mastered}</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="go('categories')">${t.startBtn}</button>
      <button class="btn btn-secondary" onclick="go('progress')">${t.progressBtn}</button>
      <p class="footer">Powered by AI · ${state.lang === 'es' ? 'Español e Inglés' : 'English & Spanish'}</p>
    </div>`;
}

function renderCategories() {
  const t = T[state.lang];
  const cats = CATEGORIES[state.lang];
  return `
    <div class="screen">
      <div class="top-bar">
        <div style="display:flex;align-items:center;gap:6px">
          <button class="back-btn" onclick="go('home')">‹</button>
          <h2 class="title">${t.pickSound}</h2>
        </div>
        ${langToggle()}
      </div>
      <div class="cat-grid">
        ${cats.map(c => {
          const prog = state.catProg[c.id] || 0;
          return `
            <div class="cat-card" style="background:${c.bg};border-color:${c.color}55" onclick="selectCat('${c.id}')">
              ${prog >= 3 ? `<div class="cat-badge" style="background:${c.color}">✓</div>` : ''}
              <div class="cat-emoji">${c.emoji}</div>
              <div class="cat-label" style="color:${c.color}">${c.label}</div>
              <div class="cat-stars">
                <span class="cat-star ${prog >= 1 ? 'on' : ''}">⭐</span>
                <span class="cat-star ${prog >= 2 ? 'on' : ''}">⭐</span>
                <span class="cat-star ${prog >= 3 ? 'on' : ''}">⭐</span>
              </div>
              <div class="cat-count">${c.words.length} ${t.words}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>`;
}

function renderPractice() {
  const t = T[state.lang];
  const cat = state.cat;
  const word = cat.words[state.wordIdx];
  return `
    <div class="screen">
      <div class="practice-header">
        <button class="back-btn" onclick="go('categories')">‹</button>
        <div style="font-weight:900;color:${cat.color};font-size:16px">${cat.label}</div>
        <div class="counter" style="background:${cat.bg};color:${cat.color}">${state.wordIdx + 1}/${cat.words.length}</div>
      </div>
      <div class="card word-card">
        <div class="word-emoji">${word.e}</div>
        <div class="word-text">${word.w}</div>
        <div class="word-hint">${t.sayWord}</div>
      </div>
      <button class="tip-toggle" style="color:${cat.color}" onclick="toggleTip()">
        ${state.showTip ? t.hideTip : t.showTip}
      </button>
      ${state.showTip ? `<div class="tip-card" style="background:${cat.bg};border-left-color:${cat.color}">${cat.hint}</div>` : ''}
      <div class="wave-row" id="waveRow" style="color:${cat.color}">
        ${Array(9).fill(0).map(() => '<div class="wave-bar"></div>').join('')}
      </div>
      <button class="btn ${state.isRecording ? 'btn-secondary' : 'btn-orange'}" 
              style="${!state.isRecording ? `background:${cat.color};animation:pulse 2s ease-in-out infinite` : ''}"
              onclick="${state.isRecording ? 'stopRecording()' : 'startRecording()'}">
        ${state.isRecording ? t.listening : t.tapSpeak}
      </button>
      <button class="demo-btn" onclick="submitSpeech('${word.w}')">${t.demoMode}</button>
      <p class="instructions">${t.instructions}</p>
    </div>`;
}

function renderResult() {
  const t = T[state.lang];
  if (state.isLoading) {
    return `
      <div class="screen loading">
        ${mascot(100)}
        <div class="loading-text">${t.checking}</div>
        <div class="spinner"></div>
      </div>`;
  }
  const fb = state.feedback;
  const cat = state.cat;
  const word = cat.words[state.wordIdx];
  return `
    <div class="screen">
      <div class="result-mascot">
        ${mascot(88, fb.stars === 3)}
        <div class="celeb-emoji">${fb.celebEmoji || '🎉'}</div>
      </div>
      <div class="stars-result">
        <span class="star-result ${fb.stars >= 1 ? 'on an0' : ''}">⭐</span>
        <span class="star-result ${fb.stars >= 2 ? 'on an1' : ''}">⭐</span>
        <span class="star-result ${fb.stars >= 3 ? 'on an2' : ''}">⭐</span>
      </div>
      <div class="card" style="text-align:center">
        <p class="message">${fb.message}</p>
        ${state.spoken && state.spoken !== word.w ? `
          <div class="heard-row">
            ${t.heard}: <strong>"${state.spoken}"</strong> · ${t.target}: <strong>"${word.w}"</strong>
          </div>
        ` : ''}
      </div>
      <div class="tip-yellow">💡 ${fb.tip}</div>
      <button class="btn" style="background:${cat.color};color:#fff" onclick="nextWord()">${t.nextWord}</button>
      <button class="btn btn-outline" style="border-color:${cat.color};color:${cat.color}" onclick="retryWord()">${t.tryAgain}</button>
      <button class="btn btn-secondary" onclick="go('categories')">${t.backToSounds}</button>
    </div>`;
}

function renderProgress() {
  const t = T[state.lang];
  const cats = CATEGORIES[state.lang];
  return `
    <div class="screen">
      <div class="top-bar">
        <div style="display:flex;align-items:center;gap:6px">
          <button class="back-btn" onclick="go('home')">‹</button>
          <h2 class="title">${t.myProgress}</h2>
        </div>
        ${langToggle()}
      </div>
      <div class="card summary-card">
        ${mascot(72)}
        <div class="stars-count">${state.totalStars} ${t.stars}! ⭐</div>
        <div class="words-count">${state.wordsDone} ${t.practiced}</div>
      </div>
      <div class="section-label">${t.soundCategories}</div>
      ${cats.map(c => {
        const prog = state.catProg[c.id] || 0;
        return `
          <div class="card prog-card">
            <div class="prog-row">
              <span class="prog-emoji">${c.emoji}</span>
              <span class="prog-name" style="color:${c.color}">${c.label}</span>
              <span class="prog-count">${prog}/3 ⭐</span>
            </div>
            <div class="bar-bg">
              <div class="bar-fill" style="background:${c.color};width:${(prog/3)*100}%"></div>
            </div>
          </div>`;
      }).join('')}
      <div class="parent-card">
        <div class="parent-title">${t.parentNote}</div>
        <div class="parent-text">
          ${state.wordsDone === 0 ? t.parentDefault : t.parentActive(state.wordsDone)}
        </div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════════════
//                          MAIN RENDER & ACTIONS
// ═══════════════════════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  switch(state.screen) {
    case 'home': app.innerHTML = renderHome(); break;
    case 'categories': app.innerHTML = renderCategories(); break;
    case 'practice': app.innerHTML = renderPractice(); break;
    case 'result': app.innerHTML = renderResult(); break;
    case 'progress': app.innerHTML = renderProgress(); break;
  }
  window.scrollTo(0, 0);
}

function go(screen) {
  state.screen = screen;
  state.showTip = false;
  render();
}

function setLang(lang) {
  state.lang = lang;
  state.cat = null;
  state.feedback = null;
  save();
  render();
}

function selectCat(id) {
  state.cat = CATEGORIES[state.lang].find(c => c.id === id);
  state.wordIdx = 0;
  state.feedback = null;
  state.showTip = false;
  go('practice');
}

function toggleTip() {
  state.showTip = !state.showTip;
  render();
}

function nextWord() {
  state.wordIdx = (state.wordIdx + 1) % state.cat.words.length;
  state.feedback = null;
  state.spoken = null;
  state.showTip = false;
  go('practice');
}

function retryWord() {
  state.feedback = null;
  state.spoken = null;
  state.showTip = false;
  go('practice');
}

// ═══════════════════════════════════════════════════════════════════════════
//                          SPEECH RECOGNITION
// ═══════════════════════════════════════════════════════════════════════════
let recognition = null;
let waveInterval = null;

function startWaveAnim() {
  const bars = document.querySelectorAll('.wave-bar');
  waveInterval = setInterval(() => {
    bars.forEach(b => {
      b.style.height = (6 + Math.random() * 38) + 'px';
      b.classList.add('active');
    });
  }, 120);
}

function stopWaveAnim() {
  if (waveInterval) clearInterval(waveInterval);
  waveInterval = null;
  document.querySelectorAll('.wave-bar').forEach(b => {
    b.style.height = '8px';
    b.classList.remove('active');
  });
}

function startRecording() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    // Fallback: just go straight to result with target word
    submitSpeech(state.cat.words[state.wordIdx].w);
    return;
  }
  recognition = new SR();
  recognition.lang = T[state.lang].srLang;
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript.toLowerCase().trim();
    state.isRecording = false;
    stopWaveAnim();
    submitSpeech(text);
  };
  recognition.onerror = () => {
    state.isRecording = false;
    stopWaveAnim();
    submitSpeech(state.cat.words[state.wordIdx].w);
  };
  recognition.onend = () => {
    state.isRecording = false;
    stopWaveAnim();
    render();
  };
  try {
    recognition.start();
    state.isRecording = true;
    render();
    setTimeout(startWaveAnim, 100);
  } catch (e) {
    submitSpeech(state.cat.words[state.wordIdx].w);
  }
}

function stopRecording() {
  if (recognition) { try { recognition.stop(); } catch(e) {} }
  state.isRecording = false;
  stopWaveAnim();
  render();
}

async function submitSpeech(spoken) {
  state.spoken = spoken;
  state.isLoading = true;
  state.screen = 'result';
  render();
  const word = state.cat.words[state.wordIdx];
  const fb = await getAIFeedback(state.lang, state.cat, word, spoken);
  state.feedback = fb;
  state.totalStars += fb.stars;
  state.wordsDone += 1;
  state.catProg[state.cat.id] = Math.min(3, (state.catProg[state.cat.id] || 0) + (fb.stars >= 2 ? 1 : 0));
  state.isLoading = false;
  save();
  render();
}

// ═══════════════════════════════════════════════════════════════════════════
//                          INIT
// ═══════════════════════════════════════════════════════════════════════════
render();

// Register service worker for PWA install (optional)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
